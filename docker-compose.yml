# ============================================================
# ACD Framework — Full Stack Docker Compose
# ============================================================
# Services:
#   api      - FastAPI application (port 8000)
#   worker   - Celery background worker
#   neo4j    - Knowledge graph database (ports 7474, 7687)
#   redis    - Cache + Celery broker (port 6379)
#
# Usage:
#   docker-compose up -d          # Start all services
#   docker-compose logs -f api    # Tail API logs
#   docker-compose down           # Stop all
#   docker-compose down -v        # Stop + delete volumes
# ============================================================

version: "3.9"

services:

  # ── FastAPI Application ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: acd-backend:latest
    container_name: acd-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DATABASE_URL=sqlite+aiosqlite:///./data/acd.db
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - acd-network

  # ── Celery Worker ────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: acd-backend:latest
    container_name: acd-worker
    command: >
      celery -A tasks.celery_app worker
      --loglevel=info
      -Q default,training,kg,reports
      -c 2
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - neo4j
    restart: unless-stopped
    networks:
      - acd-network

  # ── Neo4j Knowledge Graph ────────────────────────────────────
  neo4j:
    image: neo4j:5.24
    container_name: acd-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_pagecache_size=1G
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - acd-network

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: acd-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - acd-network

  # ── Celery Flower (monitoring UI) ────────────────────────────
  flower:
    image: acd-backend:latest
    container_name: acd-flower
    command: >
      celery -A tasks.celery_app flower
      --port=5555
      --broker=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - acd-network
    profiles:
      - monitoring   # Only start with: docker-compose --profile monitoring up

# ── Volumes ──────────────────────────────────────────────────
volumes:
  neo4j-data:
  neo4j-logs:
  redis-data:

# ── Networks ─────────────────────────────────────────────────
networks:
  acd-network:
    driver: bridge